# Glitchgate Configuration Example
# Copy this file to config.yaml and customize for your deployment

# Required: Master key for proxy authentication (or set GLITCHGATE_MASTER_KEY env var)
# Generate with: openssl rand -hex 32
master_key: "your-secure-master-key-here"

# Server settings
listen: ":4000"
database_path: "/data/glitchgate.db"
log_path: "/data/glitchgate.log"
timezone: "UTC"

# Rate limiting
login_rate_limit_per_minute: 10
login_rate_limit_burst: 5
proxy_rate_limit_per_minute: 120
proxy_rate_limit_burst: 30
proxy_ip_rate_limit_per_minute: 240
proxy_ip_rate_limit_burst: 60

# Circuit breaker
circuit_breaker_threshold: 5        # consecutive failures before tripping
circuit_breaker_cooldown_secs: 30   # seconds before half-open probe

# Request logging
request_log_retention: "720h"  # 30 days
request_log_prune_interval: "1h"
request_log_prune_batch_size: 1000
request_log_body_max_bytes: 4194304  # 4MB

# Upstream LLM providers
providers:
  # Example: Anthropic
  - name: anthropic
    type: anthropic
    base_url: https://api.anthropic.com
    auth_mode: api_key
    api_key: "${ANTHROPIC_API_KEY}"
    default_version: "2023-06-01"
    # discover_models: true             # Auto-discover available models at startup
    # model_prefix: "anthropic/"        # Default: "{name}/" — prefix for discovered model names
    # discover_filter:                  # Glob patterns to include/exclude discovered models
    #   - "claude-*"                    # Include only claude models
    #   - "!*-preview"                  # Exclude preview models

  # Example: Anthropic (Vertex AI)
  # - name: anthropic-vertex
  #   type: anthropic
  #   auth_mode: vertex
  #   project: my-gcp-project
  #   region: us-east5
  #   credentials_file: /path/to/service-account.json  # optional; omit for ADC
  #   default_version: "vertex-2023-10-16"              # optional

  # Example: OpenAI
  # - name: openai
  #   type: openai
  #   base_url: https://api.openai.com/v1
  #   auth_mode: api_key
  #   api_key: "${OPENAI_API_KEY}"

  # Example: Gemini (API key)
  # - name: gemini
  #   type: gemini
  #   auth_mode: api_key
  #   api_key: "${GEMINI_API_KEY}"

  # Example: Gemini (Vertex AI)
  # - name: gemini-vertex
  #   type: gemini
  #   auth_mode: vertex
  #   project: my-gcp-project
  #   region: us-central1
  #   credentials_file: /path/to/service-account.json  # optional; omit for ADC

  # Example: GitHub Copilot
  # - name: copilot
  #   type: github_copilot
  #   auth_mode: forward
  #   token_dir: "/data/copilot_tokens"

# Model mappings (client-facing name -> upstream provider/model)
model_list:
  # Direct mappings
  - model_name: claude-sonnet-4-6
    provider: anthropic
    upstream_model: claude-sonnet-4-6-20251001
    # Optional per-model capabilities (override built-in defaults)
    # metadata:
    #   input_token_cost: 3.00       # USD per million input tokens
    #   output_token_cost: 15.00      # USD per million output tokens
    #   cache_read_cost: 0.30         # USD per million cache read tokens
    #   cache_write_cost: 3.75        # USD per million cache write tokens
    #   context_window: 200000        # maximum context window in tokens
    #   standard_context_window: 0    # context limit at standard pricing (0 = same as context_window)
    #   max_tokens: 8192              # maximum output tokens
    #   reasoning: true               # supports extended thinking/reasoning
    #   vision: true                 # supports image input

  # Virtual model with fallback chain
  # - model_name: smart-model
  #   fallbacks:
  #     - claude-opus
  #     - gpt-4

