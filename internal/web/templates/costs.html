{{template "layout.html" .}}

{{define "title"}}Costs - glitchgate{{end}}

{{define "head"}}
<style>
    .cost-hero {
        display: flex;
        align-items: center;
        gap: 2rem;
        margin-bottom: 1.5rem;
        padding: 1rem 1.5rem;
        border: 1px solid var(--pico-muted-border-color);
        border-radius: var(--pico-border-radius);
    }
    .cost-hero-main {
        flex-shrink: 0;
    }
    .cost-hero-label {
        font-size: 0.8rem;
        color: var(--pico-muted-color);
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }
    .cost-hero-value {
        font-size: 2.25rem;
        font-weight: 700;
        color: var(--pico-primary);
        font-variant-numeric: tabular-nums;
        line-height: 1.1;
    }
    .cost-hero-stats {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
        border-left: 1px solid var(--pico-muted-border-color);
        padding-left: 2rem;
    }
    .cost-hero-stat {
        display: flex;
        flex-direction: column;
    }
    .cost-hero-stat-value {
        font-size: 1.1rem;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }
    .cost-hero-stat-label {
        font-size: 0.75rem;
        color: var(--pico-muted-color);
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }
    @media (max-width: 600px) {
        .cost-hero {
            flex-direction: column;
            align-items: flex-start;
            gap: 1rem;
        }
        .cost-hero-stats {
            border-left: none;
            padding-left: 0;
            border-top: 1px solid var(--pico-muted-border-color);
            padding-top: 1rem;
        }
    }
    .summary-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
    }
    .summary-card {
        text-align: center;
        padding: 1rem;
    }
    .summary-card .value {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--pico-primary);
        font-variant-numeric: tabular-nums;
    }
    .summary-card .label {
        font-size: 0.8rem;
        color: var(--pico-muted-color);
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }
    .bar-chart {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 160px;
        padding: 0 0 0.25rem 0;
        border-bottom: 1px solid var(--pico-muted-border-color);
        margin-bottom: 0.25rem;
    }
    .bar-chart .bar-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100%;
        justify-content: flex-end;
        min-width: 0;
    }
    .bar-chart .bar {
        width: 80%;
        max-width: 36px;
        background: var(--pico-primary);
        border-radius: 2px 2px 0 0;
        min-height: 2px;
        transition: opacity 0.15s;
    }
    .bar-chart .bar:hover {
        opacity: 0.75;
    }
    .bar-chart .bar-val {
        font-size: 0.55rem;
        color: var(--pico-muted-color);
        margin-bottom: 2px;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
    }
    .bar-labels {
        display: flex;
        gap: 2px;
    }
    .bar-labels .bar-date {
        flex: 1;
        text-align: center;
        font-size: 0.55rem;
        color: var(--pico-muted-color);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
    }
    .breakdown-bar-cell {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .breakdown-bar {
        height: 8px;
        background: var(--pico-primary);
        border-radius: 4px;
        display: inline-block;
    }
    th.sortable {
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
    }
    th.sortable:hover {
        color: var(--pico-primary);
    }
    .sort-indicator {
        display: inline-block;
        margin-left: 0.25em;
        font-size: 0.75em;
        opacity: 0.35;
    }
    th.sort-asc .sort-indicator::after { content: "↑"; opacity: 1; }
    th.sort-desc .sort-indicator::after { content: "↓"; opacity: 1; }
    .subsidy-analysis {
        margin-bottom: 1rem;
        padding: 1rem 0 0;
    }
    .subsidy-hero {
        text-align: center;
        padding: 1.5rem 1rem;
        margin-bottom: 1.5rem;
        border: 2px solid var(--pico-del-color);
        border-radius: var(--pico-border-radius);
        background: color-mix(in srgb, var(--pico-del-color) 5%, transparent);
    }
    .subsidy-hero-label {
        font-size: 0.85rem;
        color: var(--pico-muted-color);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 0.25rem;
    }
    .subsidy-hero-value {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--pico-del-color);
        font-variant-numeric: tabular-nums;
    }
    .subsidy-hero-sub {
        font-size: 0.9rem;
        color: var(--pico-muted-color);
        margin-top: 0.25rem;
    }
    .subsidy-chart .subsidy-bar {
        background: var(--pico-del-color);
    }
    .subsidy-savings {
        color: var(--pico-ins-color);
        font-weight: 600;
    }
</style>
{{end}}

{{define "content"}}
<h2>Cost Dashboard</h2>

<form class="filter-bar" action="/ui/costs" method="get" hx-get="/ui/costs" hx-select="#cost-content" hx-target="#cost-content" hx-swap="outerHTML" hx-push-url="true">
    <div>
        <label for="from">From</label>
        <input type="date" id="from" name="from" value="{{.From}}">
    </div>
    <div>
        <label for="to">To</label>
        <input type="date" id="to" name="to" value="{{.To}}">
    </div>
    <div>
        <label for="group_by">Group By</label>
        <select id="group_by" name="group_by" style="min-width:9rem;" onchange="updateGroupFilter(this.value)">
            <option value="model" {{if eq .GroupBy "model"}}selected{{end}}>Model</option>
            <option value="provider" {{if eq .GroupBy "provider"}}selected{{end}}>Provider</option>
            <option value="key" {{if eq .GroupBy "key"}}selected{{end}}>API Key</option>
        </select>
    </div>
    <div id="group-filter-wrap">
        <label id="group-filter-label" for="filter">{{if eq .GroupBy "provider"}}Provider{{else if eq .GroupBy "key"}}API Key{{else}}Model{{end}}</label>
        <input type="text" id="filter" name="filter"
               placeholder="{{if eq .GroupBy "provider"}}Filter by provider{{else if eq .GroupBy "key"}}Filter by key prefix{{else}}Filter by model{{end}}"
               value="{{.GroupFilter}}">
    </div>
    <div>
        <button type="submit" style="margin-bottom:0">Update</button>
    </div>
</form>
<script>
function updateGroupFilter(v) {
    var lbl = document.getElementById('group-filter-label');
    var inp = document.getElementById('filter');
    if (!lbl || !inp) {
        return;
    }
    var name = v === 'provider' ? 'Provider' : (v === 'key' ? 'API Key' : 'Model');
    var placeholder = v === 'provider' ? 'Filter by provider' : (v === 'key' ? 'Filter by key prefix' : 'Filter by model');
    lbl.textContent = name;
    inp.placeholder = placeholder;
}

document.addEventListener('DOMContentLoaded', function() {
    var groupBy = document.getElementById('group_by');
    if (groupBy) {
        updateGroupFilter(groupBy.value);
    }
});
</script>

<div id="cost-content">
{{template "cost_summary" .}}
</div>
<script>
function initBreakdownSort() {
    var table = document.querySelector('table.breakdown-table');
    if (!table) return;

    var sortCol = 'requests';
    var sortDir = 'desc';

    function getVal(row, col) {
        var cell = row.querySelector('td[data-col="' + col + '"]');
        return cell ? parseFloat(cell.getAttribute('data-value') || '0') : 0;
    }

    function updateBars(col) {
        var rows = Array.from(table.querySelectorAll('tbody tr'));
        var max = 0;
        rows.forEach(function(row) {
            var v = getVal(row, col);
            if (v > max) max = v;
        });
        rows.forEach(function(row) {
            var bar = row.querySelector('.breakdown-bar');
            if (!bar) return;
            var v = getVal(row, col);
            var w = max > 0 ? Math.max(2, (v / max) * 100) : 2;
            bar.style.width = w + 'px';
        });
    }

    function sortBy(col, dir) {
        sortCol = col;
        sortDir = dir;

        table.querySelectorAll('th.sortable').forEach(function(th) {
            th.classList.remove('sort-asc', 'sort-desc');
            if (th.getAttribute('data-col') === col) {
                th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');
            }
        });

        var tbody = table.querySelector('tbody');
        var rows = Array.from(tbody.querySelectorAll('tr'));
        rows.sort(function(a, b) {
            var av = getVal(a, col);
            var bv = getVal(b, col);
            return dir === 'asc' ? av - bv : bv - av;
        });
        rows.forEach(function(row) { tbody.appendChild(row); });

        updateBars(col);
    }

    table.querySelectorAll('th.sortable').forEach(function(th) {
        th.addEventListener('click', function() {
            var col = th.getAttribute('data-col');
            var newDir = (sortCol === col && sortDir === 'desc') ? 'asc' : 'desc';
            sortBy(col, newDir);
        });
    });

    sortBy('requests', 'desc');
}

document.addEventListener('DOMContentLoaded', initBreakdownSort);
document.addEventListener('htmx:afterSettle', initBreakdownSort);
</script>
{{end}}
