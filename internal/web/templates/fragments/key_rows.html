{{define "key_rows"}}
{{range .Keys}}
<tr>
    <td class="mono">{{.KeyPrefix}}</td>
    <td>
        <input type="text" class="label-edit" value="{{.Label}}" maxlength="64"
            hx-post="/ui/api/keys/{{.KeyPrefix}}/update"
            hx-trigger="blur changed, keydown[key=='Enter'] changed"
            hx-target="#key-table-body"
            hx-swap="innerHTML"
            name="label"
            aria-label="Edit label for {{.KeyPrefix}}">
    </td>
    <td>{{fmtTz .CreatedAt "2006-01-02 15:04"}} {{tzAbbrev}}</td>
    <td>
        <button class="outline btn-danger btn-sm"
            hx-post="/ui/api/keys/{{.KeyPrefix}}/revoke"
            hx-target="#key-table-body"
            hx-swap="innerHTML"
            hx-confirm="Delete key {{.KeyPrefix}}? This cannot be undone.">Delete</button>
    </td>
</tr>
{{end}}
{{end}}
