apiVersion: v1
kind: ConfigMap
metadata:
  name: glitchgate-config
  labels:
    app: glitchgate
data:
  config.yaml: |
    # Glitchgate configuration
    # Managed via Kubernetes ConfigMap - do not edit directly
    # Sensitive values use ${VAR} placeholders expanded by the config-init
    # init container via envsubst before the main container starts.

    master_key: "${GLITCHGATE_MASTER_KEY}"
    database_url: "${DATABASE_URL}"
    listen: ":4000"
    log_path: "/data/glitchgate.log"
    timezone: "UTC"
    log_level: "info"
    metrics_enabled: true

    # Rate limiting
    login_rate_limit_per_minute: 10
    login_rate_limit_burst: 5
    proxy_rate_limit_per_minute: 120
    proxy_rate_limit_burst: 30
    proxy_ip_rate_limit_per_minute: 240
    proxy_ip_rate_limit_burst: 60

    # Request logging
    request_log_retention: "720h"
    request_log_prune_interval: "1h"
    request_log_prune_batch_size: 1000
    request_log_body_max_bytes: 4194304

    # Providers - API keys injected from secrets
    providers:
      - name: anthropic
        type: anthropic
        base_url: https://api.anthropic.com
        auth_mode: proxy_key
        api_key: "${ANTHROPIC_API_KEY}"
        default_version: "2023-06-01"
      - name: copilot
        type: github_copilot

    # Model mappings
    model_list:
      # Anthropic - built-in pricing
      - model_name: claude-sonnet-4-6
        provider: anthropic
        upstream_model: claude-sonnet-4-6-20251001

      # GitHub Copilot models - track notional OpenAI API costs
      - model_name: gc/claude-sonnet-4-6
        provider: copilot
        upstream_model: claude-sonnet-4-6
        metadata:
          input_token_cost: 3.00
          output_token_cost: 15.00
          cache_write_cost: 3.75
          cache_read_cost: 0.30
      - model_name: gc/claude-sonnet-4-5
        provider: copilot
        upstream_model: claude-sonnet-4-5
        metadata:
          input_token_cost: 3.00
          output_token_cost: 15.00
          cache_write_cost: 3.75
          cache_read_cost: 0.30
      - model_name: gc/claude-opus-4-6
        provider: copilot
        upstream_model: claude-opus-4-6
        metadata:
          input_token_cost: 5.00
          output_token_cost: 25.00
          cache_write_cost: 6.25
          cache_read_cost: 0.50
      - model_name: gc/claude-opus-4-5
        provider: copilot
        upstream_model: claude-opus-4-5
        metadata:
          input_token_cost: 5.00
          output_token_cost: 25.00
          cache_write_cost: 6.25
          cache_read_cost: 0.50
      - model_name: gc/claude-haiku-4-5
        provider: copilot
        upstream_model: claude-haiku-4-5
        metadata:
          input_token_cost: 1.00
          output_token_cost: 5.00
          cache_write_cost: 1.25
          cache_read_cost: 0.10
      - model_name: gc/gpt-4.1
        provider: copilot
        upstream_model: gpt-4.1
        metadata:
          input_token_cost: 2.00
          output_token_cost: 8.00
          cache_read_cost: 0.50
      - model_name: gc/gpt-5
        provider: copilot
        upstream_model: gpt-5
        metadata:
          input_token_cost: 1.25
          output_token_cost: 10.00
      - model_name: gc/gpt-5-mini
        provider: copilot
        upstream_model: gpt-5-mini
        metadata:
          input_token_cost: 0.25
          output_token_cost: 2.00
          cache_read_cost: 0.025
      - model_name: gc/gpt-5.1
        provider: copilot
        upstream_model: gpt-5.1
        metadata:
          input_token_cost: 1.25
          output_token_cost: 10.00
      - model_name: gc/gpt-5.4
        provider: copilot
        upstream_model: gpt-5.4
        metadata:
          input_token_cost: 2.50
          output_token_cost: 15.00
          cache_read_cost: 0.25

    # OIDC Authentication (optional)
    # oidc:
    #   issuer_url: "https://auth.example.com"
    #   client_id: "glitchgate"
    #   client_secret: "${OIDC_CLIENT_SECRET}"
    #   redirect_url: "https://glitchgate.example.com/ui/auth/callback"
