apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitchgate
  labels:
    app: glitchgate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glitchgate
  template:
    metadata:
      labels:
        app: glitchgate
    spec:
      initContainers:
        - name: config-init
          image: alpine:3
          command:
            - sh
            - -c
            - apk add --no-cache gettext -q && envsubst < /config-template/config.yaml > /data/config.yaml
          envFrom:
            - secretRef:
                name: glitchgate-secrets
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: data
              mountPath: /data
      containers:
        - name: glitchgate
          image: ghcr.io/seckatie/glitchgate:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          command:
            - glitchgate
            - serve
            - --config
            - /data/config.yaml
          envFrom:
            - secretRef:
                name: glitchgate-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config-template
          configMap:
            name: glitchgate-config
        - name: data
          emptyDir: {}
