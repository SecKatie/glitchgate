apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitchgate
  labels:
    app: glitchgate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glitchgate
  template:
    metadata:
      labels:
        app: glitchgate
    spec:
      containers:
        - name: glitchgate
          image: ghcr.io/seckatie/glitchgate:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          command:
            - glitchgate
            - serve
            - --config
            - /data/config.yaml
          envFrom:
            - secretRef:
                name: glitchgate-secrets
          volumeMounts:
            - name: config
              mountPath: /data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: glitchgate-config
        - name: data
          emptyDir: {}
