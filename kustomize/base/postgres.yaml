apiVersion: v1
kind: Secret
metadata:
  name: glitchgate-postgres-secrets
  labels:
    app: glitchgate
type: Opaque
stringData:
  postgres-user: glitchgate
  postgres-password: glitchgate
  postgres-database: glitchgate
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: glitchgate-postgres
  labels:
    app: glitchgate
    component: postgres
spec:
  serviceName: glitchgate-postgres
  replicas: 1
  selector:
    matchLabels:
      app: glitchgate
      component: postgres
  template:
    metadata:
      labels:
        app: glitchgate
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          envFrom:
            - secretRef:
                name: glitchgate-postgres-secrets
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: glitchgate-postgres
  labels:
    app: glitchgate
    component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: glitchgate
    component: postgres
