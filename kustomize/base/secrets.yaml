apiVersion: v1
kind: Secret
metadata:
  name: glitchgate-secrets
  labels:
    app: glitchgate
type: Opaque
stringData:
  # Generate with: openssl rand -hex 32
  GLITCHGATE_MASTER_KEY: ""
  # Database connection URL (postgres) - leave empty to use SQLite
  DATABASE_URL: ""
  # Provider API keys (used via ${VAR} in config, expanded by init container)
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  # OIDC (optional - required if oidc block is enabled in configmap)
  OIDC_CLIENT_SECRET: ""
