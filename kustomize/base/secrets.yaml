apiVersion: v1
kind: Secret
metadata:
  name: glitchgate-secrets
  labels:
    app: glitchgate
type: Opaque
stringData:
  # Generate with: openssl rand -hex 32
  GLITCHGATE_MASTER_KEY: ""
  # Provider API keys (used via ${ANTHROPIC_API_KEY} in config)
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  # OIDC (optional)
  OIDC_CLIENT_SECRET: ""
